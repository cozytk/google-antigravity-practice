<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>문서 기반 RAG 챗봇</title>
<style>
  :root { --ink: #1f2430; --paper: #f7f6f2; --accent: #355e4b; --line: #d8d4ca; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif; background: var(--paper); color: var(--ink); }
  .wrap { max-width: 760px; margin: 0 auto; padding: 24px 16px 120px; }
  h1 { font-size: 1.4rem; border-bottom: 2px solid var(--ink); padding-bottom: 12px; }
  .panel { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .panel h2 { font-size: 0.95rem; margin: 0 0 10px; color: var(--accent); }
  .row { display: flex; gap: 8px; }
  input[type="file"] { flex: 1; }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.9rem; }
  button:disabled { opacity: 0.5; cursor: wait; }
  #status { font-size: 0.85rem; color: #666; margin-top: 8px; }
  .msg { padding: 10px 14px; border-radius: 8px; margin: 8px 0; white-space: pre-wrap; line-height: 1.6; }
  .msg.user { background: var(--ink); color: #fff; margin-left: 15%; }
  .msg.model { background: #fff; border: 1px solid var(--line); margin-right: 15%; }
  .sources { font-size: 0.8rem; color: #555; border-top: 1px dashed var(--line); margin-top: 8px; padding-top: 8px; }
  form.ask { position: fixed; bottom: 0; left: 0; right: 0; background: var(--paper); border-top: 1px solid var(--line); padding: 12px 16px; }
  form.ask .inner { max-width: 760px; margin: 0 auto; display: flex; gap: 8px; }
  form.ask input { flex: 1; padding: 10px 12px; border: 1px solid var(--line); border-radius: 6px; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>문서 기반 RAG 챗봇</h1>

  <div class="panel">
    <h2>1. 문서 업로드 (PDF, DOCX, TXT, MD …)</h2>
    <div class="row">
      <input type="file" id="file" />
      <button id="uploadBtn">업로드</button>
    </div>
    <div id="status">인덱싱에는 문서당 수십 초가 걸릴 수 있습니다.</div>
  </div>

  <div id="chat"></div>
</div>

<form class="ask" id="askForm">
  <div class="inner">
    <input id="question" placeholder="업로드한 문서에 대해 질문하세요" autocomplete="off" />
    <button type="submit" id="askBtn">질문</button>
  </div>
</form>

<script>
const history = [];

document.getElementById("uploadBtn").addEventListener("click", async () => {
  const fileInput = document.getElementById("file");
  if (!fileInput.files.length) return alert("파일을 선택하세요.");
  const btn = document.getElementById("uploadBtn");
  const status = document.getElementById("status");
  btn.disabled = true;
  status.textContent = "업로드 및 인덱싱 중… (수십 초 걸릴 수 있음)";
  try {
    const form = new FormData();
    form.append("file", fileInput.files[0]);
    const res = await fetch("/api/upload", { method: "POST", body: form });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    status.textContent = `완료: ${data.file} 인덱싱됨`;
  } catch (e) {
    status.textContent = "실패: " + e.message;
  } finally {
    btn.disabled = false;
  }
});

function addMsg(role, text, sources) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  if (sources && sources.length) {
    const src = document.createElement("div");
    src.className = "sources";
    src.textContent = sources.map((s, i) => `[${i + 1}] ${s.title}`).join("\n");
    div.appendChild(src);
  }
  document.getElementById("chat").appendChild(div);
  div.scrollIntoView({ behavior: "smooth" });
}

document.getElementById("askForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const input = document.getElementById("question");
  const q = input.value.trim();
  if (!q) return;
  input.value = "";
  addMsg("user", q);
  const btn = document.getElementById("askBtn");
  btn.disabled = true;
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ history, question: q }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    addMsg("model", data.answer, data.sources);
    history.push({ role: "user", text: q });
    history.push({ role: "model", text: data.answer });
  } catch (err) {
    addMsg("model", "오류: " + err.message);
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
